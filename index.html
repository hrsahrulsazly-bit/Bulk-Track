<!DOCTYPE html>
<html lang="ms" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0c0c14">
<title>Bulk Contract Tracking System</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="sidebar-backdrop" id="sidebarBackdrop" onclick="closeSidebar()"></div>
<div class="app">
  <aside class="sidebar" id="sidebar">
    <div class="logo">
      <div class="mark">BC</div>
      <div>
        <h1>Bulk<span>Track</span></h1>
        <p data-i18n="appTagline">Contract Tracking System</p>
      </div>
      <button class="sidebar-close" id="sidebarClose" onclick="closeSidebar()"><svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M6 6l12 12M18 6 6 18"/></svg></button>
    </div>
    <nav class="nav">
      <div class="nav-item" data-page="contract">
        <span class="ic"><svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="7" width="18" height="13" rx="2"/><path d="M8 7V5a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><path d="M3 13h18"/></svg></span>
        <span data-i18n="nav_contract">Contract</span> <span class="badge" id="navBadgeDash" style="display:none"></span>
      </div>
      <div class="nav-item" data-page="po">
        <span class="ic"><svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M14 3H7a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V8z"/><path d="M14 3v5h5"/><path d="M9 13h6M9 17h6"/></svg></span>
        <span data-i18n="nav_po">PO Tracking</span>
      </div>
      <div class="nav-item" data-page="workdone">
        <span class="ic"><svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12h4l3 8 4-16 3 8h4"/></svg></span>
        <span data-i18n="nav_workdone">Work Done</span>
      </div>
      <div class="nav-item" data-page="permit">
        <span class="ic"><svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="6" y="4" width="12" height="16" rx="2"/><path d="M9 4V3a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v1"/><path d="m9 13 2 2 4-4"/></svg></span>
        <span data-i18n="nav_permit">Permit Tracking</span>
      </div>
      <div class="nav-item" data-page="complete">
        <span class="ic"><svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="m8.5 12.5 2.5 2.5 5-5"/></svg></span>
        <span data-i18n="nav_complete">Project Completed</span>
      </div>
      <div class="nav-item" data-page="collection">
        <span class="ic"><svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="6" width="20" height="12" rx="2"/><circle cx="12" cy="12" r="3"/><path d="M6 10h.01M18 14h.01"/></svg></span>
        <span data-i18n="nav_collection">Collection Target</span>
      </div>
      <div class="nav-item" data-page="overlap">
        <span class="ic"><svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="13" height="13" rx="2"/><rect x="8" y="8" width="13" height="13" rx="2"/></svg></span>
        <span data-i18n="nav_overlap">PO Bertindih</span> <span class="badge" id="navBadgeOverlap" style="display:none"></span>
      </div>
      <div class="nav-item" data-page="admin">
        <span class="ic"><svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="3.2"/><path d="M4.5 20a7.5 7.5 0 0 1 15 0"/></svg></span>
        <span data-i18n="nav_admin">Admin</span>
      </div>
    </nav>
    <div class="sidebar-foot">
      <span data-i18n="sidebar_foot">Data disimpan secara lokal di browser ini. Sila backup secara berkala.</span>
      <button onclick="exportBackup()"><svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 4v12M7 11l5 5 5-5"/><path d="M4 20h16"/></svg> <span data-i18n="btn_backup">Backup Data</span></button>
      <button onclick="document.getElementById('backupFileInput').click()"><svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 16V4M7 9l5-5 5 5"/><path d="M4 16v3a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-3"/></svg> <span data-i18n="btn_uploadbackup">Upload Backup</span></button>
      <input type="file" id="backupFileInput" accept=".json" style="display:none">
    </div>
  </aside>

  <div class="main">
    <div class="topbar">
      <button class="hamburger-btn" id="hamburgerBtn" onclick="openSidebar()"><svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M4 6h16M4 12h16M4 18h16"/></svg></button>
      <h2 id="topTitle">Contract</h2>
      <button class="theme-toggle" id="langToggle" onclick="toggleLang()" title="English / Bahasa Malaysia" style="width:auto;padding:0 10px;font-size:11.5px;font-weight:700">EN</button>
      <button class="theme-toggle" id="themeIcon" onclick="toggleTheme()"></button>
    </div>
    <div class="content">
      <div class="page" id="page-contract"></div>
      <div class="page" id="page-po"></div>
      <div class="page" id="page-workdone"></div>
      <div class="page" id="page-permit"></div>
      <div class="page" id="page-complete"></div>
      <div class="page" id="page-collection"></div>
      <div class="page" id="page-overlap"></div>
      <div class="page" id="page-admin"></div>
    </div>

    <nav class="bottom-nav" id="bottomNav">
      <div class="bnav-item" data-page="contract">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="7" width="18" height="13" rx="2"/><path d="M8 7V5a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><path d="M3 13h18"/></svg>
        <span data-i18n="nav_contract">Contract</span>
      </div>
      <div class="bnav-item" data-page="po">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M14 3H7a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V8z"/><path d="M14 3v5h5"/><path d="M9 13h6M9 17h6"/></svg>
        <span data-i18n="nav_po">PO Tracking</span>
      </div>
      <div class="bnav-item" data-page="workdone">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12h4l3 8 4-16 3 8h4"/></svg>
        <span data-i18n="nav_workdone">Work Done</span>
      </div>
      <div class="bnav-item" data-page="permit">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="6" y="4" width="12" height="16" rx="2"/><path d="M9 4V3a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v1"/><path d="m9 13 2 2 4-4"/></svg>
        <span data-i18n="nav_permit">Permit</span>
      </div>
      <div class="bnav-item" data-page="complete">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="m8.5 12.5 2.5 2.5 5-5"/></svg>
        <span data-i18n="nav_complete">Completed</span>
      </div>
      <div class="bnav-item" data-page="collection">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="6" width="20" height="12" rx="2"/><circle cx="12" cy="12" r="3"/><path d="M6 10h.01M18 14h.01"/></svg>
        <span data-i18n="nav_collection">Collection</span>
      </div>
    </nav>
  </div>
</div>

<div class="modal-bg" id="modalBg">
  <div class="modal" id="modalContent"></div>
</div>

<div class="toast-wrap" id="toastWrap"></div>

<script src="lib/xlsx.full.min.js"></script>
<script src="app.js"></script>
<style>
  .page{display:none}
  .page.active{display:block}
</style>
</body>
</html>
